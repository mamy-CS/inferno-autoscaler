# Pre-rendered output of kustomize build on llm-d/llm-d@v0.8.1
# guides/optimized-baseline/modelserver/gpu/vllm/base.
#
# replicas is set to 1 (was 8 in the upstream guide) for CI resource constraints.
# deploy-infrastructure.sh patches args[1] with MODEL_ID and appends --max-num-seqs
# after apply.
#
# To regenerate: check out llm-d/llm-d@<new-tag>, run
#   kustomize build guides/optimized-baseline/modelserver/gpu/vllm/base
# then set replicas: 1 and prefix the vllm image with docker.io/.
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  labels:
    llm-d.ai/accelerator-variant: gpu
    llm-d.ai/accelerator-vendor: nvidia
    llm-d.ai/guide: optimized-baseline
    llm-d.ai/model: Qwen3-32B
  name: optimized-baseline-nvidia-gpu-vllm-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    llm-d.ai/accelerator-variant: gpu
    llm-d.ai/accelerator-vendor: nvidia
    llm-d.ai/guide: optimized-baseline
    llm-d.ai/model: Qwen3-32B
    llm-d.ai/role: decode
  name: optimized-baseline-nvidia-gpu-vllm-decode
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
      llm-d.ai/guide: optimized-baseline
      llm-d.ai/model: Qwen3-32B
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/accelerator-variant: gpu
        llm-d.ai/accelerator-vendor: nvidia
        llm-d.ai/guide: optimized-baseline
        llm-d.ai/model: Qwen3-32B
        llm-d.ai/role: decode
    spec:
      containers:
      - args:
        - Qwen/Qwen3-32B
        - --disable-access-log-for-endpoints=/health,/metrics,/v1/models
        - --tensor-parallel-size=2
        command:
        - vllm
        - serve
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-d-hf-token
        - name: USER
          value: llm-d
        image: docker.io/vllm/vllm-openai:v0.23.0
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: modelserver
          periodSeconds: 10
          timeoutSeconds: 5
        name: modelserver
        ports:
        - containerPort: 8000
          name: modelserver
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /v1/models
            port: modelserver
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          limits:
            cpu: "16"
            memory: 128Gi
            nvidia.com/gpu: 2
          requests:
            cpu: "8"
            memory: 96Gi
            nvidia.com/gpu: 2
        startupProbe:
          failureThreshold: 120
          httpGet:
            path: /v1/models
            port: modelserver
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
        - mountPath: /.triton
          name: triton-cache
        - mountPath: /.config
          name: vllm-config
      serviceAccountName: optimized-baseline-nvidia-gpu-vllm-sa
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 20Gi
        name: shm
      - emptyDir: {}
        name: torch-compile-cache
      - emptyDir: {}
        name: triton-cache
      - emptyDir: {}
        name: vllm-config
