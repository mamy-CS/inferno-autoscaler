apiVersion: v1
kind: Service
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: workload-variant-autoscaler
    app.kubernetes.io/managed-by: kustomize
  # Short name so namePrefix + optional instance nameSuffix stays within DNS 63-char limit
  name: cm-metrics
  namespace: workload-variant-autoscaler-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: workload-variant-autoscaler
